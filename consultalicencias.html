<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Control de Licencias — Hospital de la Mujer</title>

<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet">

<style>

:root{
--bg:#0d1117;
--sur:#161b22;
--sur2:#1c2230;
--brd:#30363d;
--acc:#00d9a3;
--acc2:#0ea5e9;
--acc4:#a855f7;
--warn:#f59e0b;
--tx:#e6edf3;
--tx2:#8b949e;
--tx3:#3d444d
}

*{
box-sizing:border-box;
margin:0;
padding:0
}

body{
font-family:'IBM Plex Sans',sans-serif;
background:var(--bg);
color:var(--tx);
min-height:100vh;
overflow-x:hidden
}

header{
background:var(--sur);
border-bottom:1px solid var(--brd);
padding:13px 24px;
display:flex;
align-items:center;
gap:12px
}

.logo{
width:32px;
height:32px;
background:var(--acc);
border-radius:7px;
display:flex;
align-items:center;
justify-content:center;
font-family:'IBM Plex Mono',monospace;
font-weight:600;
font-size:12px;
color:#0d1117;
flex-shrink:0
}

.hdr-txt h1{
font-size:13px;
font-weight:600;
letter-spacing:.02em
}

.hdr-txt p{
font-size:11px;
color:var(--tx2);
margin-top:1px
}

.pills{
margin-left:auto;
display:flex;
gap:6px;
flex-wrap:wrap
}

.pill{
background:var(--bg);
border:1px solid var(--brd);
border-radius:20px;
padding:3px 10px;
font-size:10px;
font-family:'IBM Plex Mono',monospace;
color:var(--tx2)
}

.pill b{
color:var(--acc)
}

.layout{
display:grid;
grid-template-columns:320px 1fr;
height:calc(100vh - 59px)
}

.left{
border-right:1px solid var(--brd);
display:flex;
flex-direction:column;
background:var(--sur)
}

.sbox{
padding:13px;
border-bottom:1px solid var(--brd)
}

.slbl{
font-size:10px;
color:var(--tx2);
font-family:'IBM Plex Mono',monospace;
text-transform:uppercase;
letter-spacing:.08em;
margin-bottom:6px
}

.sw{
position:relative
}

.si{
width:100%;
background:var(--bg);
border:1px solid var(--brd);
border-radius:7px;
padding:8px 30px 8px 34px;
color:var(--tx);
font-size:12px;
font-family:'IBM Plex Mono',monospace;
outline:none;
text-transform:uppercase
}

.si:focus{
border-color:var(--acc)
}

.s-ico{
position:absolute;
left:10px;
top:50%;
transform:translateY(-50%);
color:var(--tx3)
}

.ac{
background:var(--sur2);
border:1px solid var(--brd);
border-top:none;
border-radius:0 0 7px 7px;
max-height:260px;
overflow-y:auto;
display:none;
position:absolute;
width:100%;
top:100%;
left:0;
z-index:100
}

.aci{
padding:8px 12px;
cursor:pointer;
border-bottom:1px solid var(--brd)
}

.aci:hover{
background:var(--bg)
}

.aci-rfc{
font-family:'IBM Plex Mono',monospace;
font-size:11px;
color:var(--acc);
font-weight:600
}

.aci-nom{
font-size:11px;
color:var(--tx2);
margin-top:2px
}

.slist{
padding:10px 12px;
flex:1;
overflow-y:auto
}

.ri{
padding:6px 8px;
border-radius:5px;
cursor:pointer;
margin-bottom:1px;
display:flex;
align-items:center;
gap:8px
}

.ri:hover{
background:var(--sur2)
}

.ri.act{
background:var(--sur2);
border-left:2px solid var(--acc)
}

.ri-rfc{
font-family:'IBM Plex Mono',monospace;
font-size:10px;
color:var(--acc);
min-width:100px
}

.ri-nom{
font-size:10px;
color:var(--tx2)
}

.right{
display:flex;
flex-direction:column;
overflow:hidden
}

.loading{
flex:1;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
gap:10px;
color:var(--tx2)
}

.spinner{
width:28px;
height:28px;
border:2px solid var(--brd);
border-top-color:var(--acc);
border-radius:50%;
animation:spin .7s linear infinite
}

@keyframes spin{
to{transform:rotate(360deg)}
}

.empty{
flex:1;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
gap:8px;
color:var(--tx3);
display:none
}

.rp{
flex:1;
overflow-y:auto;
padding:20px;
display:none
}

.rp.on{
display:block
}

.ph{
display:flex;
align-items:flex-start;
gap:16px;
margin-bottom:20px;
padding-bottom:16px;
border-bottom:1px solid var(--brd)
}

.av{
width:44px;
height:44px;
background:linear-gradient(135deg,var(--acc),var(--acc2));
border-radius:9px;
display:flex;
align-items:center;
justify-content:center;
font-family:'IBM Plex Mono',monospace;
font-weight:600;
font-size:16px;
color:#0d1117
}

.pi{
flex:1
}

.pi-rfc{
font-family:'IBM Plex Mono',monospace;
font-size:10px;
color:var(--tx2)
}

.pi-nom{
font-size:18px;
font-weight:600;
margin-bottom:6px
}

.tot{
text-align:right
}

.tot-n{
font-family:'IBM Plex Mono',monospace;
font-size:24px;
font-weight:600;
color:var(--acc)
}

.fsec{
margin-bottom:20px
}

.fhdr{
display:flex;
align-items:center;
gap:8px;
padding:8px 12px;
border-radius:6px;
cursor:pointer;
background:var(--sur2)
}

.fdot{
width:8px;
height:8px;
border-radius:50%;
background:var(--acc)
}

.fnam{
font-size:12px;
font-weight:600;
color:var(--acc)
}

.fcnt{
font-family:'IBM Plex Mono',monospace;
font-size:10px;
color:var(--tx2)
}

.tw{
overflow-x:auto;
border:1px solid var(--brd);
border-radius:0 0 4px 4px
}

table{
width:100%;
border-collapse:collapse;
font-size:11px
}

thead tr{
background:var(--sur2);
border-bottom:1px solid var(--brd)
}

th{
padding:5px 10px;
text-align:left;
font-family:'IBM Plex Mono',monospace;
font-size:9px;
color:var(--tx2);
text-transform:uppercase
}

td{
padding:6px 10px;
border-bottom:1px solid var(--brd);
white-space:nowrap
}

tbody tr:hover td{
background:var(--sur2)
}

::-webkit-scrollbar{
width:5px;
height:5px
}

::-webkit-scrollbar-thumb{
background:var(--brd)
}

</style>
</head>

<body>

<header>

<div class="logo">HM</div>

<div class="hdr-txt">
<h1>Control de Licencias — Hospital de la Mujer</h1>
<p>Control General de Licencias Médicas</p>
</div>

<div class="pills">
<div class="pill">Personas: <b id="sp">—</b></div>
<div class="pill">Registros: <b id="sr">—</b></div>
</div>

</header>

<div class="layout">

<div class="left">

<div class="sbox">

<div class="slbl">
Buscar por RFC o nombre
</div>

<div class="sw">

<span class="s-ico">⌕</span>

<input
type="text"
class="si"
id="si"
placeholder="RFC completo o parte del nombre"
autocomplete="off"
spellcheck="false"
>

<div class="ac" id="ac"></div>

</div>

</div>

<div class="slist">
<div id="rl"></div>
</div>

</div>

<div class="right">

<div class="loading" id="ld">
<div class="spinner"></div>
<span style="font-size:12px">
Descomprimiendo datos...
</span>
</div>

<div class="empty" id="em">
<h2>Busca una persona</h2>
</div>

<div class="rp" id="rp"></div>

</div>

</div>

<script>

let DB=null;
let hist=[];
let cur=null;

function esc(s){
return String(s||'')
.replace(/&/g,'&amp;')
.replace(/</g,'&lt;')
.replace(/>/g,'&gt;')
.replace(/"/g,'&quot;');
}

function getIni(n){
if(!n)return'?';
const p=n.split(/\s+/).filter(Boolean);
return p.length>=2
?(p[0][0]+p[1][0]).toUpperCase()
:n[0].toUpperCase();
}

function fmtDate(s){

const m=String(s).match(/^(\d{4})-(\d{2})-(\d{2})/);

if(!m)return s;

return `${m[3]}/${m[2]}/${m[1]}`;
}

function fmtCell(key,val){

if(val===null||val===undefined)return'';

const s=String(val).trim();

if(/^\d{4}-\d{2}-\d{2}T/.test(s)){
return fmtDate(s);
}

return s;
}

async function loadData(){

try{

const r=await fetch('./data.json?t='+Date.now());

DB=await r.json();

let tr=0;

Object.values(DB).forEach(p=>{

Object.values(p.fuentes).forEach(s=>{

Object.values(s).forEach(r=>{

tr+=r.length;

});

});

});

document.getElementById('sp').textContent=
Object.keys(DB).length;

document.getElementById('sr').textContent=tr;

document.getElementById('ld').style.display='none';

document.getElementById('em').style.display='flex';

setupSearch();

}catch(e){

document.getElementById('ld').innerHTML=
'Error cargando data.json';

console.error(e);

}

}

function setupSearch(){

const inp=document.getElementById('si');
const ac=document.getElementById('ac');

inp.addEventListener('input',()=>{

const q=inp.value.trim().toUpperCase();

if(q.length<2){

ac.style.display='none';

return;
}

const res=[];

for(const[rfc,d]of Object.entries(DB)){

if(
rfc.includes(q) ||
(d.nombre&&d.nombre.toUpperCase().includes(q))
){
res.push(d);
}

if(res.length>=12)break;
}

if(!res.length){

ac.style.display='none';

return;
}

ac.innerHTML=res.map(p=>`

<div class="aci" onclick="pick('${p.rfc}')">

<div class="aci-rfc">
${p.rfc}
</div>

<div class="aci-nom">
${p.nombre||''}
</div>

</div>

`).join('');

ac.style.display='block';

});

}

function pick(rfc){

const p=DB[rfc];

if(!p)return;

cur=rfc;

if(!hist.includes(rfc)){
hist.unshift(rfc);
}

renderSide();

renderPerson(p);

document.getElementById('ac').style.display='none';

document.getElementById('si').value='';

}

function renderSide(){

document.getElementById('rl').innerHTML=
hist.map(r=>{

const p=DB[r];

return`

<div class="ri" onclick="pick('${r}')">

<span class="ri-rfc">
${r}
</span>

<span class="ri-nom">
${p.nombre||''}
</span>

</div>

`;

}).join('');

}

function renderPerson(p){

let totalR=0;

Object.values(p.fuentes).forEach(s=>
Object.values(s).forEach(r=>totalR+=r.length)
);

let h=`

<div class="ph">

<div class="av">
${getIni(p.nombre)}
</div>

<div class="pi">

<div class="pi-rfc">
RFC: ${p.rfc}
</div>

<div class="pi-nom">
${p.nombre||''}
</div>

</div>

<div class="tot">

<div class="tot-n">
${totalR}
</div>

<div style="font-size:10px;color:var(--tx2)">
registros
</div>

</div>

</div>
`;

for(const[sname,sheets]of Object.entries(p.fuentes)){

// SOLO CONTROL GENERAL
if(!sname.includes('Control'))continue;

const recs=sheets['Control general'];

if(!recs||!recs.length)continue;

const keys=[];

recs.forEach(r=>
Object.keys(r).forEach(k=>{
if(!keys.includes(k))keys.push(k);
})
);

const skip=[
'RFC',
'R.F.C.',
'COMPARACION',
'COMPARAR',
'COD_RHNET'
];

const dk=keys.filter(k=>!skip.includes(k));

h+=`

<div class="fsec">

<div class="fhdr">

<div class="fdot"></div>

<div class="fnam">
Control General
</div>

<div class="fcnt">
${recs.length} registros
</div>

</div>

<div class="tw">

<table>

<thead>

<tr>

<th>#</th>

${dk.map(k=>
`<th>${esc(k)}</th>`
).join('')}

</tr>

</thead>

<tbody>

`;

recs.forEach((rec,ri)=>{

h+=`

<tr>

<td>
${ri+1}
</td>

${dk.map(k=>`

<td>
${esc(fmtCell(k,rec[k]))}
</td>

`).join('')}

</tr>

`;

});

h+=`

</tbody>

</table>

</div>

</div>

`;

}

const rp=document.getElementById('rp');

rp.innerHTML=h;

rp.classList.add('on');

document.getElementById('em').style.display='none';

}

loadData();

</script>

</body>
</html>
