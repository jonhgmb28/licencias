<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control de Licencias — Hospital de la Mujer</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d1117;--sur:#161b22;--sur2:#1c2230;--brd:#30363d;--acc:#00d9a3;--acc2:#0ea5e9;--acc3:#f59e0b;--acc4:#a855f7;--warn:#f59e0b;--tx:#e6edf3;--tx2:#8b949e;--tx3:#3d444d}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;overflow-x:hidden}
header{background:var(--sur);border-bottom:1px solid var(--brd);padding:13px 24px;display:flex;align-items:center;gap:12px}
.logo{width:32px;height:32px;background:var(--acc);border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:12px;color:#0d1117;flex-shrink:0}
.hdr-txt h1{font-size:13px;font-weight:600;letter-spacing:.02em}
.hdr-txt p{font-size:11px;color:var(--tx2);margin-top:1px}
.pills{margin-left:auto;display:flex;gap:6px;flex-wrap:wrap}
.pill{background:var(--bg);border:1px solid var(--brd);border-radius:20px;padding:3px 10px;font-size:10px;font-family:'IBM Plex Mono',monospace;color:var(--tx2);white-space:nowrap}
.pill b{color:var(--acc)}
.layout{display:grid;grid-template-columns:320px 1fr;height:calc(100vh - 59px)}
.left{border-right:1px solid var(--brd);display:flex;flex-direction:column;background:var(--sur)}
.sbox{padding:13px;border-bottom:1px solid var(--brd)}
.slbl{font-size:10px;color:var(--tx2);font-family:'IBM Plex Mono',monospace;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.sw{position:relative}
.si{width:100%;background:var(--bg);border:1px solid var(--brd);border-radius:7px;padding:8px 30px 8px 34px;color:var(--tx);font-size:12px;font-family:'IBM Plex Mono',monospace;outline:none;transition:border-color .2s;text-transform:uppercase}
.si:focus{border-color:var(--acc)}
.s-ico{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--tx3);font-size:14px;pointer-events:none}
.s-clr{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--tx3);cursor:pointer;font-size:13px;display:none}
.ac{background:var(--sur2);border:1px solid var(--brd);border-radius:0 0 7px 7px;max-height:260px;overflow-y:auto;display:none;position:absolute;width:100%;z-index:100}
.aci{padding:8px 12px;cursor:pointer;border-bottom:1px solid var(--brd)}
.aci:hover{background:var(--bg)}
.aci-rfc{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--acc);font-weight:600}
.aci-nom{font-size:11px;color:var(--tx2);margin-top:2px}
.slist{padding:10px 12px;flex:1;overflow-y:auto}
.ri{padding:6px 8px;border-radius:5px;cursor:pointer;margin-bottom:1px;display:flex;align-items:center;gap:8px}
.ri:hover,.ri.act{background:var(--sur2)}
.ri-rfc{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--acc);min-width:100px}
.ri-nom{font-size:10px;color:var(--tx2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.right{display:flex;flex-direction:column;overflow:hidden}
.loading{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--tx2)}
.spinner{width:28px;height:28px;border:2px solid var(--brd);border-top-color:var(--acc);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--tx3);display:none}
.rp{flex:1;overflow-y:auto;padding:20px;display:none}
.rp.on{display:block}
.ph{display:flex;align-items:flex-start;gap:16px;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--brd)}
.av{width:44px;height:44px;background:linear-gradient(135deg,var(--acc),var(--acc2));border-radius:9px;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:16px;color:#0d1117}
.pi-rfc{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--tx2);text-transform:uppercase;margin-bottom:3px}
.pi-nom{font-size:18px;font-weight:600;margin-bottom:6px}
.tot{margin-left:auto;text-align:right}
.tot-n{font-family:'IBM Plex Mono',monospace;font-size:24px;font-weight:600;color:var(--acc)}
.fsec{margin-bottom:20px}
.fhdr{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:6px;cursor:pointer;margin-bottom:8px}
.fhdr:hover{background:var(--sur2)}
.fnam{font-size:12px;font-weight:600;flex:1}
.fbody{display:block}
.fbody.hid{display:none}
.ssec{margin-bottom:8px;margin-left:16px}
.sttl{font-size:10px;color:var(--tx2);font-family:'IBM Plex Mono',monospace;padding:5px 10px;background:var(--sur);border:1px solid var(--brd);border-bottom:none}
.tw{overflow-x:auto;border:1px solid var(--brd)}
table{width:100%;border-collapse:collapse;font-size:11px}
th{padding:5px 10px;text-align:left;font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--tx2);text-transform:uppercase}
td{padding:6px 10px;border-bottom:1px solid var(--brd);color:var(--tx)}
.rn{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--tx3)}
.fac-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;padding:10px;background:var(--sur);border:1px solid var(--brd)}
.fac-info{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:6px;padding:10px;background:var(--sur);border:1px solid var(--brd);border-top:none}
.fac-key{font-size:9px;color:var(--tx3);text-transform:uppercase}
.fac-val{font-size:12px}
.mes-card{background:var(--bg);border:1px solid var(--brd);border-radius:6px;padding:8px 10px;border-left:3px solid var(--acc4)}
.mes-nom{font-size:9px;color:var(--tx2);margin-bottom:3px}
.mes-val{font-size:11px;color:var(--acc4);font-weight:600}
.mes-card.empty-mes{border-left-color:var(--brd);opacity:.4}
</style>
</head>
<body>
<header>
  <div class="logo">HM</div>
  <div class="hdr-txt"><h1>Control de Licencias — Hospital de la Mujer</h1></div>
  <div class="pills">
    <div class="pill">Personas: <b id="sp">—</b></div>
    <div class="pill">Registros: <b id="sr">—</b></div>
  </div>
</header>
<div class="layout">
  <div class="left">
    <div class="sbox"><input type="text" class="si" id="si" placeholder="RFC o nombre..."></div>
    <div class="slist"><div id="rl"></div></div>
  </div>
  <div class="right">
    <div class="loading" id="ld"><div class="spinner"></div></div>
    <div class="empty" id="em"><h2>Busca una persona</h2></div>
    <div class="rp" id="rp"></div>
  </div>
</div>
<script>
const MAPA_FUENTES = {
  "Control 2023-2024": "Licencias Médicas",
  "LCGS 2025": "Licencias con Goce de Sueldo",
  "Facilidades 2026": "Facilidades Administrativas"
};

let DB=null,hist=[];

async function loadData(){
  try{
    const r = await fetch('./data.json?t=' + Date.now());
    DB = await r.json();
    document.getElementById('ld').style.display='none';
    document.getElementById('em').style.display='flex';
    setupSearch();
  }catch(e){ console.error(e); }
}

function esHojaValida(sname, shName) {
  if (sname === "Control 2023-2024") return shName === "Control general";
  if (sname === "LCGS 2025") return shName === "LCGS";
  return true;
}

function renderPerson(p){
  let h=`<div class="ph"><div class="av">${p.nombre?p.nombre[0]:'?'}</div><div class="pi"><div class="pi-rfc">RFC: ${p.rfc}</div><div class="pi-nom">${p.nombre||'Sin nombre'}</div></div></div>`;
  
  for(const[sname, sheets] of Object.entries(p.fuentes)){
    const hojasValidas = Object.entries(sheets).filter(([sh]) => esHojaValida(sname, sh));
    if(hojasValidas.length === 0) continue;

    h+=`<div class="fsec"><div class="fhdr" onclick="toggleF(this)"><div class="fnam">${MAPA_FUENTES[sname]||sname}</div></div><div class="fbody">`;
    
    for(const[shName, recs] of hojasValidas){
      if(!recs.length) continue;
      h+=`<div class="ssec"><div class="sttl">${shName} (${recs.length} reg.)</div>`;
      if(sname.includes('Facilidad')){
        h+=`<div class="fac-grid">`;
        recs.forEach(rec => {
          ['ENERO','FEBRERO','MARZO','ABRIL','MAYO','JUNIO','JULIO','AGOSTO','SEPTIEMBRE','OCTUBRE','NOVIEMBRE','DICIEMBRE'].forEach(mes => {
            const val = rec[`FACILIDAD ${mes} 2026`] || '';
            h+=`<div class="mes-card ${val?'':'empty-mes'}"><div class="mes-nom">${mes}</div><div class="mes-val">${val||'—'}</div></div>`;
          });
        });
        h+=`</div>`;
      } else {
        const keys = Array.from(new Set(recs.flatMap(r => Object.keys(r))));
        const dk = keys.filter(k => !['RFC','R.F.C.'].includes(k));
        h+=`<div class="tw"><table><thead><tr><th>#</th>${dk.map(k=>`<th>${k}</th>`).join('')}</tr></thead><tbody>`;
        recs.forEach((rec, ri) => {
          h+=`<tr><td class="rn">${ri+1}</td>${dk.map(k => `<td>${String(rec[k]||'')}</td>`).join('')}</tr>`;
        });
        h+=`</tbody></table></div>`;
      }
      h+=`</div>`;
    }
    h+=`</div></div>`;
  }
  document.getElementById('rp').innerHTML = h;
  document.getElementById('rp').className = 'rp on';
  document.getElementById('em').style.display='none';
}

function toggleF(hdr){ hdr.nextElementSibling.classList.toggle('hid'); }
function setupSearch(){ document.getElementById('si').addEventListener('input', e=>{
    const q = e.target.value.toUpperCase();
    if(q.length < 2) return;
    const match = Object.values(DB).find(p => p.rfc.includes(q) || (p.nombre && p.nombre.toUpperCase().includes(q)));
    if(match) renderPerson(match);
});}
loadData();
</script>
</body>
</html>
