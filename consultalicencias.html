<!DOCTYPE ht<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control de Licencias — Hospital de la Mujer</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
/* ===== ESTILOS ORIGINALES (se mantienen) ===== */
:root{--bg:#f4f6f8;--sur:#ffffff;--sur2:#eef2f6;--brd:#d8dee6;--acc:#1f5f8b;--acc2:#2f6f63;--acc3:#7a8694;--acc4:#1f5f8b;--warn:#7a8694;--tx:#1f2933;--tx2:#5f6b7a;--tx3:#9aa4b2;--soft:#f8fafc;--muted:#eef2f6}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;overflow-x:hidden}
header{background:var(--sur);border-bottom:1px solid var(--brd);padding:13px 24px;display:flex;align-items:center;gap:12px}
.logo{width:32px;height:32px;background:var(--acc);border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:12px;color:#0d1117;flex-shrink:0}
.hdr-txt h1{font-size:13px;font-weight:600;letter-spacing:.02em}
.hdr-txt p{font-size:11px;color:var(--tx2);margin-top:1px}
.pills{margin-left:auto;display:flex;gap:6px;flex-wrap:wrap}
.pill{background:var(--bg);border:1px solid var(--brd);border-radius:20px;padding:3px 10px;font-size:10px;font-family:'IBM Plex Mono',monospace;color:var(--tx2);white-space:nowrap}
.pill b{color:var(--acc)}
.layout{display:grid;grid-template-columns:320px 1fr;height:calc(100vh - 59px)}
.left{border-right:1px solid var(--brd);display:flex;flex-direction:column;background:var(--sur)}
.sbox{padding:13px;border-bottom:1px solid var(--brd)}
.slbl{font-size:10px;color:var(--tx2);font-family:'IBM Plex Mono',monospace;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.sw{position:relative}
.si{width:100%;background:var(--bg);border:1px solid var(--brd);border-radius:7px;padding:8px 30px 8px 34px;color:var(--tx);font-size:12px;font-family:'IBM Plex Mono',monospace;outline:none;transition:border-color .2s;text-transform:uppercase}
.si::placeholder{color:var(--tx3);text-transform:none;font-size:11px}
.si:focus{border-color:var(--acc)}
.s-ico{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--tx3);font-size:14px;pointer-events:none}
.s-clr{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--tx3);cursor:pointer;font-size:13px;display:none;line-height:1}
.s-clr:hover{color:var(--tx2)}
.ac{background:var(--sur2);border:1px solid var(--brd);border-top:none;border-radius:0 0 7px 7px;max-height:260px;overflow-y:auto;display:none;position:absolute;width:100%;top:100%;left:0;z-index:100;box-shadow:0 8px 24px rgba(0,0,0,.4)}
.aci{padding:8px 12px;cursor:pointer;border-bottom:1px solid var(--brd)}
.aci:last-child{border-bottom:none}
.aci:hover,.aci.act{background:var(--bg)}
.aci-rfc{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--acc);font-weight:600;letter-spacing:.04em}
.aci-nom{font-size:11px;color:var(--tx2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.aci-tags{display:flex;gap:3px;margin-top:3px;flex-wrap:wrap}
.tag{font-size:9px;padding:1px 5px;border-radius:9px;font-family:'IBM Plex Mono',monospace;font-weight:600}
.tag-c{background:rgba(0,217,163,.12);color:var(--acc);border:1px solid rgba(0,217,163,.2)}
.tag-l{background:rgba(14,165,233,.12);color:var(--acc2);border:1px solid rgba(14,165,233,.2)}
.tag-f{background:rgba(168,85,247,.12);color:var(--acc4);border:1px solid rgba(168,85,247,.2)}
.slist{padding:10px 12px;flex:1;overflow-y:auto}
.s-sec-lbl{font-size:9px;color:var(--tx3);font-family:'IBM Plex Mono',monospace;text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px;padding:0 2px}
.ri{padding:6px 8px;border-radius:5px;cursor:pointer;transition:background .1s;margin-bottom:1px;display:flex;align-items:center;gap:8px}
.ri:hover{background:var(--sur2)}
.ri.act{background:var(--sur2);border-left:2px solid var(--acc);padding-left:6px}
.ri-rfc{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--acc);min-width:100px;flex-shrink:0}
.ri-nom{font-size:10px;color:var(--tx2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ri-dots{display:flex;gap:3px;margin-left:auto;flex-shrink:0}
.rdot{width:5px;height:5px;border-radius:50%}
.right{display:flex;flex-direction:column;overflow:hidden}
.loading{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--tx2)}
.spinner{width:28px;height:28px;border:2px solid var(--brd);border-top-color:var(--acc);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--tx3);display:none}
.empty-ico{font-size:40px;opacity:.2}
.empty h2{font-size:14px;font-weight:400;color:var(--tx3)}
.empty p{font-size:11px}
.rp{flex:1;overflow-y:auto;padding:20px;display:none}
.rp.on{display:block}
.ph{display:flex;align-items:flex-start;gap:16px;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--brd)}
.av{width:44px;height:44px;background:linear-gradient(135deg,var(--acc),var(--acc2));border-radius:9px;display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:16px;color:#0d1117;flex-shrink:0}
.pi{flex:1;min-width:0}
.pi-rfc{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--tx2);letter-spacing:.08em;text-transform:uppercase;margin-bottom:3px}
.pi-nom{font-size:18px;font-weight:600;line-height:1.2;margin-bottom:6px}
.pi-chips{display:flex;gap:6px;flex-wrap:wrap}
.chip{font-size:10px;padding:2px 8px;border-radius:11px;font-family:'IBM Plex Mono',monospace;font-weight:600}
.chip-c{background:rgba(0,217,163,.12);color:var(--acc);border:1px solid rgba(0,217,163,.25)}
.chip-l{background:rgba(14,165,233,.12);color:var(--acc2);border:1px solid rgba(14,165,233,.25)}
.chip-f{background:rgba(168,85,247,.12);color:var(--acc4);border:1px solid rgba(168,85,247,.25)}
.tot{margin-left:auto;text-align:right;flex-shrink:0}
.tot-n{font-family:'IBM Plex Mono',monospace;font-size:24px;font-weight:600;color:var(--acc);line-height:1}
.tot-l{font-size:10px;color:var(--tx2);margin-top:2px}
.fsec{margin-bottom:20px}
.fhdr{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:6px;cursor:pointer;user-select:none;transition:background .15s;margin-bottom:8px}
.fhdr:hover{background:var(--sur2)}
.fdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.src-c .fdot{background:var(--acc)}
.src-l .fdot{background:var(--acc2)}
.src-f .fdot{background:var(--acc4)}
.fnam{font-size:12px;font-weight:600;flex:1}
.src-c .fnam{color:var(--acc)}
.src-l .fnam{color:var(--acc2)}
.src-f .fnam{color:var(--acc4)}
.fcnt{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--tx2)}
.chev{font-size:10px;color:var(--tx3);transition:transform .2s}
.fhdr.col .chev{transform:rotate(-90deg)}
.fbody{display:block}
.fbody.hid{display:none}
.ssec{margin-bottom:8px;margin-left:16px}
.sttl{font-size:10px;color:var(--tx2);font-family:'IBM Plex Mono',monospace;text-transform:uppercase;letter-spacing:.05em;padding:5px 10px;background:var(--sur);border-radius:4px 4px 0 0;border:1px solid var(--brd);border-bottom:none;display:flex;justify-content:space-between;align-items:center}
.sbdg{background:var(--bg);border:1px solid var(--brd);border-radius:9px;padding:1px 7px;font-size:9px;color:var(--tx2)}
.tw{overflow-x:auto;border:1px solid var(--brd);border-radius:0 0 4px 4px}
table{width:100%;border-collapse:collapse;font-size:11px}
thead tr{background:var(--sur2);border-bottom:1px solid var(--brd)}
th{padding:5px 10px;text-align:left;font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--tx2);text-transform:uppercase;letter-spacing:.05em;white-space:nowrap;font-weight:400}
td{padding:6px 10px;border-bottom:1px solid var(--brd);color:var(--tx);white-space:nowrap;max-width:220px;overflow:hidden;text-overflow:ellipsis}
tr:last-child td{border-bottom:none}
tbody tr:hover td{background:var(--sur2)}
.nc{font-family:'IBM Plex Mono',monospace;color:var(--acc2);font-size:10px}
.dc{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--warn)}
.tc{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--acc);font-weight:600}
.rn{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--tx3)}
.fac-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;padding:10px;background:var(--sur);border:1px solid var(--brd);border-radius:0 0 4px 4px}
.fac-info{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:6px;padding:10px;background:var(--sur);border:1px solid var(--brd);border-top:none;border-bottom:none}
.fac-field{display:flex;flex-direction:column;gap:2px}
.fac-key{font-size:9px;color:var(--tx3);font-family:'IBM Plex Mono',monospace;text-transform:uppercase;letter-spacing:.06em}
.fac-val{font-size:12px;color:var(--tx)}
.fac-val.time{font-family:'IBM Plex Mono',monospace;color:var(--acc);font-weight:600}
.mes-card{background:var(--bg);border:1px solid var(--brd);border-radius:6px;padding:8px 10px;border-left:3px solid var(--acc4)}
.mes-nom{font-size:9px;color:var(--tx2);font-family:'IBM Plex Mono',monospace;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.mes-val{font-size:11px;color:var(--acc4);font-weight:600;font-family:'IBM Plex Mono',monospace;word-break:break-all;white-space:normal;line-height:1.5}
.day-chips{display:flex;flex-wrap:wrap;gap:3px;margin-top:2px}
.day-chip{background:rgba(168,85,247,.15);border:1px solid rgba(168,85,247,.3);border-radius:4px;padding:1px 5px;font-size:10px;font-family:'IBM Plex Mono',monospace;color:var(--acc4);font-weight:600}
.day-range{background:rgba(168,85,247,.08);border:1px dashed rgba(168,85,247,.3);border-radius:4px;padding:1px 6px;font-size:10px;font-family:'IBM Plex Mono',monospace;color:var(--acc4)}
.mes-card.empty-mes{border-left-color:var(--brd);opacity:.35}
.mes-card.empty-mes .mes-val{color:var(--tx3)}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--brd);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--tx3)}

/* ===== REPORTES AVANZADOS ===== */
.adv-wrap{display:flex;flex-direction:column;gap:14px}
.adv-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;padding:14px;border:1px solid var(--brd);border-radius:12px;background:linear-gradient(135deg,rgba(168,85,247,.12),rgba(14,165,233,.08));}
.adv-title h2{font-size:18px;margin-bottom:4px}
.adv-title p{font-size:11px;color:var(--tx2);line-height:1.4}
.adv-actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
.adv-btn{background:#1f5f8b;border:none;color:#fff;border-radius:8px;padding:8px 10px;font-size:10px;font-family:'IBM Plex Mono',monospace;font-weight:600;cursor:pointer}
.adv-btn.secondary{background:var(--sur2);color:var(--tx);border-color:var(--brd)}
.adv-filters{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:10px;padding:12px;border:1px solid var(--brd);border-radius:10px;background:var(--sur)}
.adv-field{display:flex;flex-direction:column;gap:5px}
.adv-field label{font-size:9px;color:var(--tx2);font-family:'IBM Plex Mono',monospace;text-transform:uppercase;letter-spacing:.07em}
.adv-field select,.adv-field input{background:var(--bg);border:1px solid var(--brd);border-radius:7px;color:var(--tx);font-size:11px;padding:8px;outline:none;min-width:0}
.adv-field select:focus,.adv-field input:focus{border-color:var(--acc4)}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px}
.kpi{background:var(--sur);border:1px solid var(--brd);border-radius:10px;padding:12px;position:relative;overflow:hidden}
.kpi:before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--acc4)}
.kpi-num{font-family:'IBM Plex Mono',monospace;font-size:23px;font-weight:600;color:var(--acc4);line-height:1}
.kpi-lbl{font-size:10px;color:var(--tx2);margin-top:5px;text-transform:uppercase;letter-spacing:.04em}
.kpi-sub{font-size:10px;color:var(--tx3);margin-top:4px}
.adv-grid{display:grid;grid-template-columns:1.15fr .85fr;gap:12px}
@media(max-width:1000px){.adv-grid{grid-template-columns:1fr}.adv-head{flex-direction:column}.adv-actions{justify-content:flex-start}}
.adv-card{background:var(--sur);border:1px solid var(--brd);border-radius:10px;overflow:hidden}
.adv-card-h{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-bottom:1px solid var(--brd);background:var(--sur2)}
.adv-card-h h3{font-size:12px;color:var(--tx);font-weight:600}
.adv-card-h span{font-size:10px;color:var(--tx2);font-family:'IBM Plex Mono',monospace}
.bar-list{padding:10px 12px;display:flex;flex-direction:column;gap:9px}
.bar-row{display:grid;grid-template-columns:minmax(130px,1fr) 1.8fr 58px;gap:8px;align-items:center}
.bar-name{font-size:10px;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-track{height:8px;background:var(--bg);border:1px solid var(--brd);border-radius:20px;overflow:hidden}
.bar-fill{height:100%;background:linear-gradient(90deg,var(--acc4),var(--acc2));border-radius:20px}
.bar-val{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--tx2);text-align:right}
.adv-table-wrap{max-height:420px;overflow:auto;border-top:1px solid var(--brd)}
.adv-note{font-size:10px;color:var(--tx2);padding:10px 12px;line-height:1.4;border-top:1px solid var(--brd)}
.empty-adv{padding:30px;text-align:center;color:var(--tx3);font-size:12px}

<body>

      background:#1f5f8b;

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
<script>
let DB=null,hist=[],cur=null,acItems=[],acIdx=-1;

// ── FORMATEO ─────────────────────────────────────────────────────────────────
function isExcelTime(s){return typeof s==='string'&&s.startsWith('1899-12-30T');}
function isISODate(s){return typeof s==='string'&&/^\d{4}-\d{2}-\d{2}T/.test(s)&&!s.startsWith('1899');}
function fmtTime(s) {
  if (typeof s === 'string' && s.includes('T')) {
    const dateObj = new Date(s);
    const hh = String(dateObj.getHours()).padStart(2, '0');
    const mm = String(dateObj.getMinutes()).padStart(2, '0');
    if (isNaN(dateObj.getTime())) return s; 
    return `${hh}:${mm}`;
  }
  return s;
}
function fmtDate(s){
  const m=s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  return m?m[3]+'/'+m[2]+'/'+m[1]:s;
}
function fmtFacilidad(v){
  if(!v)return'';
  let s=String(v).trim();
  if(!s||s==='.'||s==='}'||/^\s+$/.test(s))return'';
  if(isISODate(s))return`<span class="day-chip">${fmtDate(s)}</span>`;
  s=s.replace(/\\/g,'/').replace(/,\s*$/,'').trim();
  const yrMatch=s.match(/\/(\d{4})$/);
  if(!yrMatch)return`<span class="day-chip">${esc(s)}</span>`;
  const yr=yrMatch[1];
  const rest=s.slice(0,s.length-5);
  const mmMatch=rest.match(/\/(\d{2})$/);
  if(!mmMatch)return`<span class="day-chip">${esc(s)}</span>`;
  const mm=mmMatch[1];
  const daysPart=rest.slice(0,rest.length-3);
  return parseDayPart(daysPart,mm,yr);
}
function parseDayPart(part,mm,yr){
  if(!part)return`<span class="day-chip">${mm}/${yr}</span>`;
  const tokens=part.split('/').map(t=>t.trim()).filter(Boolean);
  let chips='';
  for(const t of tokens){
    if(t.includes('-')){
      const parts=t.split('-').map(x=>x.trim()).filter(Boolean);
      if(parts.length===2&&parseInt(parts[1])>parseInt(parts[0])){
        chips+=`<span class="day-range">${pad(parts[0])}–${pad(parts[1])}/${mm}/${yr}</span>`;
      } else {
        parts.forEach(d=>chips+=`<span class="day-chip">${pad(d)}/${mm}/${yr}</span>`);
      }
    } else if(t.includes(',')){
      t.split(',').forEach(d=>chips+=`<span class="day-chip">${pad(d.trim())}/${mm}/${yr}</span>`);
    } else {
      chips+=`<span class="day-chip">${pad(t)}/${mm}/${yr}</span>`;
    }
  }
  return chips||`<span class="day-chip">${esc(part)}/${mm}/${yr}</span>`;
}
function pad(d){return String(parseInt(d,10)).padStart(2,'0');}
function fmtCell(key,val){
  if(val===null||val===undefined||val==='')return'—';
  const s=String(val).trim();
  if(!s)return'—';
  const kl=key.toLowerCase();
  if(isExcelTime(s))return fmtTime(s);
  if(isISODate(s))return fmtDate(s);
  return s;
}
function ccc(key,val){
  const s=String(val||'').trim();
  const kl=key.toLowerCase();
  if(isExcelTime(s)||kl==='entrada'||kl==='salida')return'tc';
  if(isISODate(s)||/^\d{2}\/\d{2}\/\d{4}$/.test(s)||kl.includes('fecha'))return'dc';
  if(s&&!isNaN(s)&&/^\d+(\.\d+)?$/.test(s))return'nc';
  return'';
}
// ── NOMBRES DE FUENTES ────────────────────────────────────────────────────────
function srcLabel(n){
  if(n.includes('2023')||n.includes('Control'))return'CTR 23-24';
  if(n.includes('2025')||n.includes('LCGS'))return'LCGS 25';
  return'FAC 26';
}
function srcClass(n){
  if(n.includes('2023')||n.includes('Control'))return'src-c';
  if(n.includes('2025')||n.includes('LCGS'))return'src-l';
  return'src-f';
}
function srcColor(n){
  if(n.includes('2023')||n.includes('Control'))return'var(--acc)';
  if(n.includes('2025')||n.includes('LCGS'))return'var(--acc2)';
  return'var(--acc4)';
}
function chipClass(n){
  if(n.includes('2023')||n.includes('Control'))return'chip-c';
  if(n.includes('2025')||n.includes('LCGS'))return'chip-l';
  return'chip-f';
}
function tagClass(n){
  if(n.includes('2023')||n.includes('Control'))return'tag-c';
  if(n.includes('2025')||n.includes('LCGS'))return'tag-l';
  return'tag-f';
}
function srcDisplayName(n){
  if(n.includes('Facilidad'))return'Facilidades Administrativas 2026';
  if(n.includes('LCGS')||n.includes('2025'))return'Licencias con Goce de Sueldo';
  if(n.includes('2023')||n.includes('Control')||n.includes('Licencia'))return'Licencias Médicas';
  return n;
}
// ── DATOS ─────────────────────────────────────────────────────────────────────
async function loadData(){
  try{
    const r=await fetch('./data.json?t='+Date.now());
    if(!r.ok)throw new Error('No se pudo cargar data.json');
    DB=await r.json();
    let tr=0;
    Object.values(DB).forEach(p=>Object.values(p.fuentes).forEach(s=>Object.values(s).forEach(r=>tr+=r.length)));
    document.getElementById('sp').textContent=Object.keys(DB).length.toLocaleString('es-MX');
    document.getElementById('sr').textContent=tr.toLocaleString('es-MX');
    document.getElementById('ld').style.display='none';
    document.getElementById('em').style.display='flex';
    setupSearch();
  }catch(e){
    document.getElementById('ld').innerHTML='<span style="color:#f87171;font-size:12px">Error: '+e.message+'</span>';
    console.error(e);
  }
}
// ── BÚSQUEDA ──────────────────────────────────────────────────────────────────
function setupSearch(){
  const inp=document.getElementById('si'),ac=document.getElementById('ac'),sc=document.getElementById('sc');
  inp.addEventListener('input',()=>{
    const q=inp.value.trim().toUpperCase();
    sc.style.display=q?'block':'none';
    if(q.length<2){hideAC();return;}
    const res=searchDB(q,14);
    if(!res.length){hideAC();return;}
    acItems=res;acIdx=-1;
    ac.innerHTML=res.map((p,i)=>`<div class="aci" data-rfc="${p.rfc}" data-i="${i}">
      <div class="aci-rfc">${hl(p.rfc,q)}</div>
      <div class="aci-nom">${hl(p.nombre||'(sin nombre)',q)}</div>
      <div class="aci-tags">${Object.keys(p.fuentes).map(s=>`<span class="tag ${tagClass(s)}">${srcLabel(s)}</span>`).join('')}</div>
    </div>`).join('');
    ac.querySelectorAll('.aci').forEach(el=>el.addEventListener('mousedown',e=>{
      e.preventDefault();pick(el.dataset.rfc);inp.value='';sc.style.display='none';
    }));
    ac.style.display='block';
  });
  inp.addEventListener('keydown',e=>{
    if(!acItems.length)return;
    const els=ac.querySelectorAll('.aci');
    if(e.key==='ArrowDown'){e.preventDefault();acIdx=Math.min(acIdx+1,els.length-1);els.forEach((el,i)=>el.classList.toggle('act',i===acIdx));}
    else if(e.key==='ArrowUp'){e.preventDefault();acIdx=Math.max(acIdx-1,-1);els.forEach((el,i)=>el.classList.toggle('act',i===acIdx));}
    else if(e.key==='Enter'){e.preventDefault();const t=acIdx>=0?acItems[acIdx]:acItems[0];if(t){pick(t.rfc);inp.value='';sc.style.display='none';}}
    else if(e.key==='Escape')hideAC();
  });
  sc.addEventListener('click',()=>{inp.value='';sc.style.display='none';hideAC();inp.focus();});
  document.addEventListener('click',e=>{if(!e.target.closest('#sw'))hideAC();});
}
function hideAC(){document.getElementById('ac').style.display='none';acItems=[];acIdx=-1;}
function searchDB(q,lim){
  const res=[];
  for(const[rfc,d]of Object.entries(DB)){
    if(res.length>=lim)break;
    if(rfc.includes(q)||(d.nombre&&d.nombre.toUpperCase().includes(q)))res.push(d);
  }
  res.sort((a,b)=>(a.rfc.startsWith(q)?0:1)-(b.rfc.startsWith(q)?0:1));
  return res.slice(0,lim);
}
function hl(t,q){
  if(!t)return t;
  const i=t.toUpperCase().indexOf(q);if(i<0)return t;
  return t.slice(0,i)+'<mark style="background:rgba(0,217,163,.2);color:var(--acc);border-radius:2px">'+t.slice(i,i+q.length)+'</mark>'+t.slice(i+q.length);
}
// ── SELECCIÓN ─────────────────────────────────────────────────────────────────
function pick(rfc){
  hideAC();
  const p=DB[rfc];if(!p)return;
  cur=rfc;
  const ei=hist.indexOf(rfc);if(ei!==-1)hist.splice(ei,1);
  hist.unshift(rfc);if(hist.length>25)hist.pop();
  renderSide();renderPerson(p);
}
function renderSide(){
  document.getElementById('rl').innerHTML=hist.map(r=>{
    const p=DB[r];if(!p)return'';
    const dots=Object.keys(p.fuentes).map(s=>`<div class="rdot" style="background:${srcColor(s)}"></div>`).join('');
    return`<div class="ri ${r===cur?'act':''}" onclick="pick('${r}')">
      <span class="ri-rfc">${r}</span>
      <span class="ri-nom">${p.nombre||'—'}</span>
      <div class="ri-dots">${dots}</div>
    </div>`;
  }).join('');
}
// ── RENDER PERSONA (MUESTRA TODAS LAS COLUMNAS SIN FILTRAR, EXCEPTO EMPTY) ───
function renderPerson(p){
  let totalR=0;
  Object.values(p.fuentes).forEach(s=>Object.values(s).forEach(r=>totalR+=r.length));

  let h=`<div class="ph">
    <div class="av">${getIni(p.nombre)}</div>
    <div class="pi">
      <div class="pi-rfc">RFC: ${p.rfc}</div>
      <div class="pi-nom">${p.nombre||'(Sin nombre registrado)'}</div>
      <div class="pi-chips">${Object.keys(p.fuentes).map(s=>`<span class="chip ${chipClass(s)}">${srcDisplayName(s)}</span>`).join('')}</div>
    </div>
    <div class="tot">
  <div class="tot-n">${totalR}</div>
  <div class="tot-l">registros totales</div>
  <button onclick="genPDF()" style="
    margin-top:10px;
    background:var(--acc);
    border:none;
    color:#000;
    padding:7px 12px;
    border-radius:6px;
    cursor:pointer;
    font-weight:600;
    font-size:11px;
  ">
    Descargar PDF
  </button>
</div>
  </div>`;

  for(const[sname,sheets]of Object.entries(p.fuentes)){
    const st=Object.values(sheets).reduce((a,r)=>a+r.length,0);
    const cls=srcClass(sname);
    const displayName=srcDisplayName(sname);

    h+=`<div class="fsec"><div class="fhdr ${cls}" onclick="toggleF(this)">
      <div class="fdot"></div><div class="fnam">${displayName}</div>
      <div class="fcnt">${st} registro${st!==1?'s':''}</div><span class="chev">▾</span>
    </div><div class="fbody">`;

    for(const[shName,recs]of Object.entries(sheets)){
      if(!recs.length)continue;
      const isFac=sname.includes('Facilidad');

      h+=`<div class="ssec"><div class="sttl">${shName}<span class="sbdg">${recs.length} reg.</span></div>`;

      if(isFac){
        // FACILIDADES (sin cambios)
        const MESES=['ENERO','FEBRERO','MARZO','ABRIL','MAYO','JUNIO','JULIO','AGOSTO','SEPTIEMBRE','OCTUBRE','NOVIEMBRE','DICIEMBRE'];
        recs.forEach((rec,ri)=>{
          if(recs.length>1)
            h+=`<div style="padding:4px 10px;font-size:9px;color:var(--tx3);font-family:'IBM Plex Mono',monospace;background:var(--sur);border:1px solid var(--brd);border-bottom:none">REGISTRO ${ri+1}</div>`;
          const infoKeys=['TARJETA','TURNO','ENTRADA','SALIDA','SERVICIO'];
          const infoFields=infoKeys.filter(k=>rec[k]!==undefined&&rec[k]!==null&&rec[k]!=='');
          if(infoFields.length){
            h+=`<div class="fac-info">`;
            infoFields.forEach(k=>{
              let v=rec[k];
              let display='';
              let extraClass='';
              const vs=String(v||'').trim();
              if(k==='ENTRADA'||k==='SALIDA'){
                display=isExcelTime(vs)?fmtTime(vs):vs;
                extraClass=' time';
              } else {
                display=isISODate(vs)?fmtDate(vs):vs;
              }
              h+=`<div class="fac-field"><span class="fac-key">${k}</span><span class="fac-val${extraClass}">${esc(display)}</span></div>`;
            });
            h+=`</div>`;
          }
          h+=`<div class="fac-grid">`;
          MESES.forEach(mes=>{
            const key=`FACILIDADES ADMINISTRATIVAS ${mes} 2026`;
            const val=rec[key];
            const vs=String(val||'').trim();
            const isEmpty=!vs||vs==='.'||vs==='}'||/^\s+$/.test(vs);
            const chips=isEmpty?'':fmtFacilidad(vs);
            h+=`<div class="mes-card ${isEmpty?'empty-mes':''}">
              <div class="mes-nom">${mes}</div>
              ${isEmpty
                ?'<div class="mes-val">—</div>'
                :`<div class="day-chips">${chips}</div>`}
            </div>`;
          });
          h+=`</div>`;
        });
      } else {
        // TABLA GENÉRICA: mostrar todas las columnas (excepto "EMPTY")
        // TABLA GENÉRICA: mostrar TODAS las columnas del Excel
const allKeys = [];

recs.forEach(r => {
  Object.keys(r).forEach(k => {
    if (!allKeys.includes(k)) {
      allKeys.push(k);
    }
  });
});

// NO eliminar columnas EMPTY porque
// el Excel usa esas columnas para datos reales
const dk = allKeys;
        
        h+=`<div class="tw"><table><thead><tr><th>#</th>${dk.map(k=>`<th>${esc(k)}</th>`).join('')}</tr></thead><tbody>`;
        recs.forEach((rec,ri)=>{
          h+=`<tr><td class="rn">${ri+1}</td>${dk.map(k=>{
            const raw=rec[k];
            const v=fmtCell(k,raw);
            const cls=ccc(k,String(raw||''));
            return`<td class="${cls}" title="${esc(v)}">${esc(v)}</td>`;
          }).join('')}</tr>`;
        });
        h+=`</tbody></table></div>`;
      }
      h+=`</div>`;
    }
    h+=`</div></div>`;
  }

  const rp=document.getElementById('rp');
  rp.innerHTML=h;
  rp.classList.add('on');
  rp.scrollTop=0;
  document.getElementById('em').style.display='none';
}

function toggleF(hdr){
  hdr.classList.toggle('col');
  hdr.nextElementSibling.classList.toggle('hid');
}
function getIni(n){
  if(!n)return'?';
  const p=n.replace(/,/g,' ').replace(/\//g,' ').split(/\s+/).filter(Boolean);
  return p.length>=2?(p[0][0]+p[1][0]).toUpperCase():n[0].toUpperCase();
}
function esc(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

loadData();

  async function genPDF(){

  if(!cur || !DB[cur]) return;

  const p = DB[cur];
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  // =====================================================
  // HELPERS PARA LEER COLUMNAS CON NOMBRES VARIABLES
  // =====================================================

  function normKey(k){
    return String(k || '')
      .normalize('NFD')
      .replace(/[\u0300-\u036f]/g,'')
      .toUpperCase()
      .replace(/\s+/g,' ')
      .trim();
  }

  function valByNames(row, names){
    const wanted = names.map(normKey);
    for(const [k,v] of Object.entries(row)){
      if(v === null || v === undefined || String(v).trim() === '') continue;
      if(wanted.includes(normKey(k))) return v;
    }
    return '';
  }

  function valByContains(row, words){
    const wanted = words.map(normKey);
    for(const [k,v] of Object.entries(row)){
      if(v === null || v === undefined || String(v).trim() === '') continue;
      const nk = normKey(k);
      if(wanted.every(w => nk.includes(w))) return v;
    }
    return '';
  }

  function firstVal(row, options){
    for(const op of options){
      const v = Array.isArray(op)
        ? valByNames(row, op)
        : valByContains(row, [op]);

      if(v !== null && v !== undefined && String(v).trim() !== '') return v;
    }
    return '—';
  }

  function outDate(v){
    if(v === null || v === undefined || String(v).trim() === '') return '—';
    const s = String(v).trim();
    return isISODate(s) ? fmtDate(s) : s;
  }

  function outTime(v){
    if(v === null || v === undefined || String(v).trim() === '') return '—';
    const s = String(v).trim();
    return isExcelTime(s) ? fmtTime(s) : s;
  }

  function fechaLicencia(row, suf=''){
    const d = valByNames(row, [`D${suf}`]);
    const m = valByNames(row, [`M${suf}`]);
    const a = valByNames(row, [`A${suf}`]) || valByNames(row, ['A']);

    if(d || m || a){
      return `${d || '--'}/${m || '--'}/${a || '--'}`;
    }

    return outDate(firstVal(row, [
      [`FECHA${suf}`],
      [`FECHA DE INICIO${suf}`],
      [`INICIO${suf}`]
    ]));
  }

  function cleanFacilityValue(v){
    if(v === null || v === undefined) return '';
    let s = String(v).trim();
    if(!s || s === '.' || s === '}') return '';
    if(isISODate(s)) return fmtDate(s);
    return s.replace(/\\/g,'/').replace(/,\s*$/,'').trim();
  }

  function hasRealData(values){
    return values.some(v => {
      const s = String(v ?? '').trim();
      return s && s !== '—' && s !== '--/--/--' && s !== '././.' && s !== 'undefined/undefined/undefined';
    });
  }

  function hasValidLicencia(row, diagnostico, inicio, termino, dias){
    // Evita contar renglones vacíos o de relleno del Excel.
    // Se considera licencia real si tiene diagnóstico, días o una fecha armada.
    return hasRealData([diagnostico, dias]) ||
      /\d/.test(String(inicio || '')) ||
      /\d/.test(String(termino || ''));
  }

  function expandDiasFacilidad(valor){
    const v = cleanFacilityValue(valor);
    if(!v) return [];

    // Si viene como fecha ISO de Excel/JSON, cuenta como una facilidad.
    if(/^\d{2}\/\d{2}\/\d{4}$/.test(v)) return [v];

    // Formatos esperados:
    // 12/15/05/2026  => dos facilidades: 12/05/2026 y 15/05/2026
    // 12-15/05/2026  => una facilidad: 12-15/05/2026
    // 12,15/05/2026  => dos facilidades: 12/05/2026 y 15/05/2026
    const match = v.match(/^(.+)\/(\d{1,2})\/(\d{4})$/);
    if(!match) return [v];

    const diasPart = match[1].trim();
    const mm = String(parseInt(match[2],10)).padStart(2,'0');
    const yr = match[3];
    const eventos = [];

    diasPart.split('/').forEach(token => {
      token = token.trim();
      if(!token) return;

      if(token.includes('-')){
        // Un rango cuenta como una sola facilidad.
        const partes = token.split('-').map(x => x.trim()).filter(Boolean);
        if(partes.length === 2){
          eventos.push(`${pad(partes[0])}-${pad(partes[1])}/${mm}/${yr}`);
        } else {
          eventos.push(`${token}/${mm}/${yr}`);
        }
      } else if(token.includes(',')){
        // Días separados por coma cuentan como facilidades independientes.
        token.split(',').map(x => x.trim()).filter(Boolean).forEach(d => {
          eventos.push(`${pad(d)}/${mm}/${yr}`);
        });
      } else {
        eventos.push(`${pad(token)}/${mm}/${yr}`);
      }
    });

    return eventos.length ? eventos : [v];
  }

  function diasFacilidad(row){
    const meses = [
      'ENERO','FEBRERO','MARZO','ABRIL','MAYO','JUNIO',
      'JULIO','AGOSTO','SEPTIEMBRE','OCTUBRE','NOVIEMBRE','DICIEMBRE'
    ];

    const dias = [];

    meses.forEach(mes => {
      const key = Object.keys(row).find(k => {
        const nk = normKey(k);
        return nk.includes('FACILIDADES ADMINISTRATIVAS') && nk.includes(mes) && nk.includes('2026');
      });

      if(!key) return;

      expandDiasFacilidad(row[key]).forEach(d => dias.push(`${mes}: ${d}`));
    });

    return dias;
  }

  function isLicMed(src){
    const ns = normKey(src);
    return (ns.includes('CONTROL') || ns.includes('LICENCIA')) &&
           !ns.includes('LCGS') &&
           !ns.includes('GOCE') &&
           !ns.includes('FACILIDAD');
  }

  function isLCGS(src){
    const ns = normKey(src);
    return ns.includes('LCGS') || ns.includes('GOCE');
  }

  function isFac(src){
    return normKey(src).includes('FACILIDAD');
  }

  // =====================================================
  // VARIABLES
  // =====================================================

  let totalLic = 0;
  let totalLCGS = 0;
  let totalFac = 0;

  const licencias = [];
  const lcgs = [];
  const facilidades = [];

  // =====================================================
  // RECORRER DATOS
  // =====================================================

  Object.entries(p.fuentes).forEach(([src, sheets]) => {

    Object.entries(sheets).forEach(([sheet, recs]) => {

      recs.forEach(r => {

        // =================================================
        // LICENCIAS MÉDICAS
        // =================================================

        if(isLicMed(src)){

          const diagnostico = firstVal(r, [
            ['DIAGNOSTICO','DIAGNÓSTICO','DIAGNOSTICO_2','DIAGNÓSTICO_2'],
            'DIAGNOSTICO'
          ]);

          const dias = firstVal(r, [
            ['# DIAS','# DÍAS','DIAS','DÍAS','NO. DIAS','NO. DÍAS','NUMERO DE DIAS','NÚMERO DE DÍAS'],
            'DIAS'
          ]);

          const inicio = fechaLicencia(r, '');
          const termino = fechaLicencia(r, '_2');

          if(hasValidLicencia(r, diagnostico, inicio, termino, dias)){
            licencias.push([
              diagnostico,
              inicio,
              termino,
              dias
            ]);
          }
        }

        // =================================================
        // LICENCIAS CON GOCE DE SUELDO
        // =================================================

        else if(isLCGS(src)){

          const rowLCGS = [

            firstVal(r, [
              ['CONSECUTIVO','NO.','NUMERO','NÚMERO']
            ]),

            firstVal(r, [
              ['NO. DÍAS','NO. DIAS','DIAS','DÍAS']
            ]),

            outDate(firstVal(r, [
              ['FECHA DE INICIO','FECHA INICIO','INICIO']
            ])),

            outDate(firstVal(r, [
              ['FECHA DE TERMINO','FECHA DE TÉRMINO','FECHA TERMINO','FECHA TÉRMINO','TERMINO','TÉRMINO']
            ])),

            firstVal(r, [
              ['TURNO','TURNO ','JORNADA'],
              'TURNO'
            ])
          ];

          if(hasRealData(rowLCGS)){
            lcgs.push(rowLCGS);
          }
        }

        // =================================================
        // FACILIDADES ADMINISTRATIVAS
        // =================================================

        else if(isFac(src)){

          const servicio = firstVal(r, [
            ['SERVICIO','ÁREA','AREA']
          ]);

          const turno = firstVal(r, [
            ['TURNO','TURNO ','JORNADA'],
            'TURNO'
          ]);

          const entrada = outTime(firstVal(r, [
            ['ENTRADA','HORA ENTRADA']
          ]));

          const salida = outTime(firstVal(r, [
            ['SALIDA','HORA SALIDA']
          ]));

          const eventosFacilidad = diasFacilidad(r);

          // Cada día separado cuenta como una facilidad independiente.
          // Ejemplo: 12/15/05/2026 = 2 facilidades.
          // Un rango cuenta como una sola facilidad.
          // Ejemplo: 12-15/05/2026 = 1 facilidad.
          if(eventosFacilidad.length){
            eventosFacilidad.forEach(dia => {
              facilidades.push([
                servicio,
                turno,
                entrada,
                salida,
                dia
              ]);
            });
          } else {
            const rowFacilidad = [servicio, turno, entrada, salida, '—'];
            if(hasRealData(rowFacilidad)) facilidades.push(rowFacilidad);
          }
        }

      });

    });

  });

  // Los totales deben salir de los arreglos ya filtrados,
  // para que coincidan exactamente con lo que se imprime abajo.
  totalLic = licencias.length;
  totalLCGS = lcgs.length;
  totalFac = facilidades.length;

  // =====================================================
  // HEADER
  // =====================================================

  doc.setFillColor(31,95,139);
  doc.rect(0,0,210,30,'F');

  doc.setTextColor(255,255,255);

  doc.setFontSize(20);
  doc.text('Reporte Integral de Licencias',14,15);

  doc.setFontSize(10);
  doc.text('Hospital de la Mujer',14,22);

  // =====================================================
  // PERSONA
  // =====================================================

  doc.setTextColor(0,0,0);

  let y = 40;

  doc.setFontSize(16);
  doc.text(p.nombre || 'SIN NOMBRE',14,y);

  y += 8;

  doc.setFontSize(11);
  doc.text(`RFC: ${p.rfc}`,14,y);

  y += 14;

  // =====================================================
  // RESUMEN
  // =====================================================

  doc.setFillColor(240,240,240);

  doc.roundedRect(14,y,180,28,3,3,'F');

  doc.setFontSize(12);

  doc.text(`Licencias Médicas: ${totalLic}`,20,y+10);

  doc.text(`LCGS: ${totalLCGS}`,20,y+18);

  doc.text(`Facilidades: ${totalFac}`,100,y+10);

  doc.text(`Total Registros: ${totalLic+totalLCGS+totalFac}`,100,y+18);

  y += 40;

  // =====================================================
  // LICENCIAS
  // =====================================================

  if(licencias.length){

    doc.setFontSize(14);

    doc.text('Licencias Médicas',14,y);

    y += 4;

    doc.autoTable({

      startY:y,

      head:[[
        'Diagnóstico',
        'Inicio',
        'Término',
        'Días'
      ]],

      body:licencias,

      styles:{
        fontSize:8,
        cellWidth:'wrap',
        overflow:'linebreak'
      },

      columnStyles:{
        0:{cellWidth:80},
        1:{cellWidth:32},
        2:{cellWidth:32},
        3:{cellWidth:18}
      },

      headStyles:{
        fillColor:[31,95,139]
      }

    });

    y = doc.lastAutoTable.finalY + 12;
  }

  // =====================================================
  // LCGS
  // =====================================================

  if(lcgs.length){

    doc.setFontSize(14);

    doc.text('Licencias con Goce de Sueldo',14,y);

    y += 4;

    doc.autoTable({

      startY:y,

      head:[[
        'Consecutivo',
        'Días',
        'Inicio',
        'Término',
        'Turno'
      ]],

      body:lcgs,

      styles:{
        fontSize:8,
        overflow:'linebreak'
      },

      headStyles:{
        fillColor:[31,95,139]
      }

    });

    y = doc.lastAutoTable.finalY + 12;
  }

  // =====================================================
  // FACILIDADES
  // =====================================================

  if(facilidades.length){

    doc.setFontSize(14);

    doc.text('Facilidades Administrativas',14,y);

    y += 4;

    doc.autoTable({

      startY:y,

      head:[[
        'Servicio',
        'Turno',
        'Entrada',
        'Salida',
        'Día de facilidad'
      ]],

      body:facilidades,

      styles:{
        fontSize:8,
        overflow:'linebreak'
      },

      columnStyles:{
        0:{cellWidth:38},
        1:{cellWidth:24},
        2:{cellWidth:22},
        3:{cellWidth:22},
        4:{cellWidth:74}
      },

      headStyles:{
        fillColor:[31,95,139]
      }

    });

  }

  // =====================================================
  // FOOTER
  // =====================================================

  const pageCount = doc.internal.getNumberOfPages();

  for(let i=1;i<=pageCount;i++){

    doc.setPage(i);

    doc.setFontSize(9);

    doc.setTextColor(120);

    doc.text(
      `Generado: ${new Date().toLocaleString('es-MX')}`,
      14,
      290
    );

    doc.text(
      `Página ${i} de ${pageCount}`,
      170,
      290
    );
  }

  // =====================================================
  // DESCARGAR
  // =====================================================

  const safeName =
    (p.nombre || p.rfc)
      .replace(/[^\w\s]/gi,'')
      .replace(/\s+/g,'_');

  doc.save(`REPORTE_${safeName}.pdf`);
}


// =====================================================
// REPORTE GLOBAL: FACILIDADES OTORGADAS EN EL MES ACTUAL
// =====================================================
async function genReporteGlobalFacMes(mesIndex = new Date().getMonth(), anio = new Date().getFullYear()){

  if(!DB){
    alert('Primero espera a que cargue la base de datos.');
    return;
  }

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  const MESES = [
    'ENERO','FEBRERO','MARZO','ABRIL','MAYO','JUNIO',
    'JULIO','AGOSTO','SEPTIEMBRE','OCTUBRE','NOVIEMBRE','DICIEMBRE'
  ];

  const mesNombre = MESES[mesIndex];
  const mesNumero = String(mesIndex + 1).padStart(2,'0');
  const anioStr = String(anio);

  function normKey(k){
    return String(k || '')
      .normalize('NFD')
      .replace(/[\u0300-\u036f]/g,'')
      .toUpperCase()
      .replace(/\s+/g,' ')
      .trim();
  }

  function isFacSource(src){
    return normKey(src).includes('FACILIDAD');
  }

  function valByNames(row, names){
    const wanted = names.map(normKey);
    for(const [k,v] of Object.entries(row)){
      if(v === null || v === undefined || String(v).trim() === '') continue;
      if(wanted.includes(normKey(k))) return v;
    }
    return '';
  }

  function outTime(v){
    if(v === null || v === undefined || String(v).trim() === '') return '—';
    const s = String(v).trim();
    return isExcelTime(s) ? fmtTime(s) : s;
  }

  function cleanFacilityValue(v){
    if(v === null || v === undefined) return '';
    let s = String(v).trim();
    if(!s || s === '.' || s === '}') return '';
    if(isISODate(s)) return fmtDate(s);
    return s.replace(/\\/g,'/').replace(/,\s*$/,'').trim();
  }

  function expandDiasFacilidad(valor){
    const v = cleanFacilityValue(valor);
    if(!v) return [];

    // Fecha completa única: 12/05/2026
    if(/^\d{2}\/\d{2}\/\d{4}$/.test(v)) return [v];

    // Formatos esperados:
    // 12/15/05/2026 = 2 facilidades
    // 12,15/05/2026 = 2 facilidades
    // 12-15/05/2026 = 1 facilidad
    const match = v.match(/^(.+)\/(\d{1,2})\/(\d{4})$/);
    if(!match) return [v];

    const diasPart = match[1].trim();
    const mm = String(parseInt(match[2],10)).padStart(2,'0');
    const yr = match[3];
    const eventos = [];

    diasPart.split('/').forEach(token => {
      token = token.trim();
      if(!token) return;

      if(token.includes('-')){
        const partes = token.split('-').map(x => x.trim()).filter(Boolean);
        if(partes.length === 2){
          eventos.push(`${pad(partes[0])}-${pad(partes[1])}/${mm}/${yr}`);
        } else {
          eventos.push(`${token}/${mm}/${yr}`);
        }
      } else if(token.includes(',')){
        token.split(',').map(x => x.trim()).filter(Boolean).forEach(d => {
          eventos.push(`${pad(d)}/${mm}/${yr}`);
        });
      } else {
        eventos.push(`${pad(token)}/${mm}/${yr}`);
      }
    });

    return eventos.length ? eventos : [v];
  }

  function getCampoMes(row){
    return Object.keys(row).find(k => {
      const nk = normKey(k);
      return nk.includes('FACILIDADES ADMINISTRATIVAS') &&
             nk.includes(mesNombre) &&
             nk.includes(anioStr);
    });
  }

  const detalle = [];
  const porPersona = new Map();
  const porServicio = new Map();
  const porTurno = new Map();

  Object.values(DB).forEach(persona => {
    Object.entries(persona.fuentes || {}).forEach(([src, sheets]) => {
      if(!isFacSource(src)) return;

      Object.values(sheets || {}).forEach(recs => {
        (recs || []).forEach(row => {
          const campoMes = getCampoMes(row);
          if(!campoMes) return;

          const eventos = expandDiasFacilidad(row[campoMes]);
          if(!eventos.length) return;

          const servicio = valByNames(row, ['SERVICIO','AREA','ÁREA']) || '—';
          const turno = valByNames(row, ['TURNO','JORNADA']) || '—';
          const entrada = outTime(valByNames(row, ['ENTRADA','HORA ENTRADA']));
          const salida = outTime(valByNames(row, ['SALIDA','HORA SALIDA']));

          eventos.forEach(dia => {
            detalle.push({
              rfc: persona.rfc || '—',
              nombre: persona.nombre || 'SIN NOMBRE',
              servicio,
              turno,
              entrada,
              salida,
              dia
            });

            const pKey = `${persona.rfc || '—'} | ${persona.nombre || 'SIN NOMBRE'}`;
            porPersona.set(pKey, (porPersona.get(pKey) || 0) + 1);
            porServicio.set(servicio, (porServicio.get(servicio) || 0) + 1);
            porTurno.set(turno, (porTurno.get(turno) || 0) + 1);
          });
        });
      });
    });
  });

  detalle.sort((a,b) =>
    String(a.nombre).localeCompare(String(b.nombre),'es') ||
    String(a.dia).localeCompare(String(b.dia),'es')
  );

  // =====================================================
  // HEADER
  // =====================================================

  doc.setFillColor(31,95,139);
  doc.rect(0,0,210,32,'F');
  doc.setTextColor(255,255,255);
  doc.setFontSize(17);
  doc.text('Reporte Global de Facilidades Administrativas',14,15);
  doc.setFontSize(10);
  doc.text(`Mes: ${mesNombre} ${anioStr} · Hospital de la Mujer`,14,23);

  let y = 42;
  doc.setTextColor(0,0,0);

  doc.setFillColor(245,245,245);
  doc.roundedRect(14,y,180,26,3,3,'F');
  doc.setFontSize(13);
  doc.text(`Total de facilidades otorgadas: ${detalle.length}`,20,y+11);
  doc.setFontSize(10);
  doc.text(`Personas con facilidad: ${porPersona.size}`,20,y+20);
  doc.text(`Servicios registrados: ${porServicio.size}`,100,y+20);

  y += 38;

  if(!detalle.length){
    doc.setFontSize(12);
    doc.text(`No se encontraron facilidades administrativas para ${mesNombre} ${anioStr}.`,14,y);
  } else {

    // RESUMEN POR SERVICIO
    doc.setFontSize(14);
    doc.text('Resumen por servicio',14,y);
    y += 4;

    doc.autoTable({
      startY:y,
      head:[['Servicio','Total']],
      body:Array.from(porServicio.entries())
        .sort((a,b) => b[1]-a[1] || String(a[0]).localeCompare(String(b[0]),'es')),
      styles:{fontSize:8, overflow:'linebreak'},
      columnStyles:{0:{cellWidth:140},1:{cellWidth:25, halign:'center'}},
      headStyles:{fillColor:[31,95,139]}
    });

    y = doc.lastAutoTable.finalY + 12;

    // RESUMEN POR TURNO
    doc.setFontSize(14);
    doc.text('Resumen por turno',14,y);
    y += 4;

    doc.autoTable({
      startY:y,
      head:[['Turno','Total']],
      body:Array.from(porTurno.entries())
        .sort((a,b) => b[1]-a[1] || String(a[0]).localeCompare(String(b[0]),'es')),
      styles:{fontSize:8, overflow:'linebreak'},
      columnStyles:{0:{cellWidth:80},1:{cellWidth:25, halign:'center'}},
      headStyles:{fillColor:[31,95,139]}
    });

    y = doc.lastAutoTable.finalY + 12;

    // DETALLE
    doc.setFontSize(14);
    doc.text('Detalle de facilidades',14,y);
    y += 4;

    doc.autoTable({
      startY:y,
      head:[[ 'RFC','Nombre','Servicio','Turno','Entrada','Salida','Día de facilidad' ]],
      body:detalle.map(d => [d.rfc,d.nombre,d.servicio,d.turno,d.entrada,d.salida,d.dia]),
      styles:{fontSize:7, overflow:'linebreak'},
      columnStyles:{
        0:{cellWidth:24},
        1:{cellWidth:42},
        2:{cellWidth:36},
        3:{cellWidth:18},
        4:{cellWidth:17},
        5:{cellWidth:17},
        6:{cellWidth:34}
      },
      headStyles:{fillColor:[31,95,139]}
    });
  }

  // FOOTER
  const pageCount = doc.internal.getNumberOfPages();
  for(let i=1;i<=pageCount;i++){
    doc.setPage(i);
    doc.setFontSize(9);
    doc.setTextColor(120);
    doc.text(`Generado: ${new Date().toLocaleString('es-MX')}`,14,290);
    doc.text(`Página ${i} de ${pageCount}`,170,290);
  }

  doc.save(`REPORTE_GLOBAL_FACILIDADES_${mesNombre}_${anioStr}.pdf`);
}


// =====================================================
// REPORTE AVANZADO: FACILIDADES ADMINISTRATIVAS
// =====================================================
const FAC_MESES = ['ENERO','FEBRERO','MARZO','ABRIL','MAYO','JUNIO','JULIO','AGOSTO','SEPTIEMBRE','OCTUBRE','NOVIEMBRE','DICIEMBRE'];

function advNorm(v){
  return String(v || '')
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g,'')
    .toUpperCase()
    .replace(/\s+/g,' ')
    .trim();
}
function advIsFacSource(src){return advNorm(src).includes('FACILIDAD');}
function advValByNames(row,names){
  const wanted=names.map(advNorm);
  for(const [k,v] of Object.entries(row||{})){
    if(v===null||v===undefined||String(v).trim()==='') continue;
    if(wanted.includes(advNorm(k))) return v;
  }
  return '';
}
function advClean(v){
  if(v===null||v===undefined) return '';
  let s=String(v).trim();
  if(!s||s==='.'||s==='}'||/^\s+$/.test(s)) return '';
  if(isISODate(s)) return fmtDate(s);
  return s.replace(/\\/g,'/').replace(/,\s*$/,'').trim();
}
function advMonthIndexFromName(mes){
  const i=FAC_MESES.indexOf(advNorm(mes));
  return i>=0?i:null;
}
function advParseMonthField(key){
  const nk=advNorm(key);
  if(!nk.includes('FACILIDADES ADMINISTRATIVAS')) return null;
  const mes=FAC_MESES.find(m=>nk.includes(m));
  const anio=(nk.match(/(20\d{2})/)||[])[1];
  if(!mes||!anio) return null;
  return {mes, mesIndex:FAC_MESES.indexOf(mes), anio};
}
function advOutTime(v){
  if(v===null||v===undefined||String(v).trim()==='') return '—';
  const s=String(v).trim();
  return isExcelTime(s)?fmtTime(s):s;
}
function advExpandEventos(valor, mesIndexFallback=null, anioFallback=''){
  const v=advClean(valor);
  if(!v) return [];
  if(/^\d{4}-\d{2}-\d{2}/.test(v)) return [fmtDate(v)];
  if(/^\d{1,2}\/\d{1,2}\/\d{4}$/.test(v)){
    const [d,m,y]=v.split('/');
    return [`${pad(d)}/${pad(m)}/${y}`];
  }
  const match=v.match(/^(.+)\/(\d{1,2})\/(\d{4})$/);
  const eventos=[];
  let diasPart='', mm='', yr='';
  if(match){
    diasPart=match[1].trim();
    mm=pad(match[2]);
    yr=match[3];
  }else if(mesIndexFallback!==null && /\d/.test(v)){
    diasPart=v;
    mm=String(mesIndexFallback+1).padStart(2,'0');
    yr=String(anioFallback||new Date().getFullYear());
  }else{
    return [v];
  }
  diasPart.split('/').forEach(token=>{
    token=token.trim();
    if(!token) return;
    if(token.includes('-')){
      const partes=token.split('-').map(x=>x.trim()).filter(Boolean);
      if(partes.length===2) eventos.push(`${pad(partes[0])}-${pad(partes[1])}/${mm}/${yr}`);
      else eventos.push(`${token}/${mm}/${yr}`);
    }else if(token.includes(',')){
      token.split(',').map(x=>x.trim()).filter(Boolean).forEach(d=>eventos.push(`${pad(d)}/${mm}/${yr}`));
    }else{
      eventos.push(`${pad(token)}/${mm}/${yr}`);
    }
  });
  return eventos.length?eventos:[v];
}
function advBuildEventos(){
  const eventos=[];
  if(!DB) return eventos;
  Object.values(DB).forEach(persona=>{
    Object.entries(persona.fuentes||{}).forEach(([src,sheets])=>{
      if(!advIsFacSource(src)) return;
      Object.entries(sheets||{}).forEach(([sheet,recs])=>{
        (recs||[]).forEach(row=>{
          const servicio=String(advValByNames(row,['SERVICIO','AREA','ÁREA','DEPARTAMENTO'])||'—').trim()||'—';
          const turno=String(advValByNames(row,['TURNO','JORNADA'])||'—').trim()||'—';
          const entrada=advOutTime(advValByNames(row,['ENTRADA','HORA ENTRADA']));
          const salida=advOutTime(advValByNames(row,['SALIDA','HORA SALIDA']));
          Object.keys(row||{}).forEach(k=>{
            const meta=advParseMonthField(k);
            if(!meta) return;
            const dias=advExpandEventos(row[k],meta.mesIndex,meta.anio);
            dias.forEach(dia=>eventos.push({
              rfc:persona.rfc||'—', nombre:persona.nombre||'SIN NOMBRE', servicio, turno, entrada, salida,
              dia, mes:meta.mes, mesIndex:meta.mesIndex, anio:String(meta.anio), sheet
            }));
          });
        });
      });
    });
  });
  return eventos;
}
function advUniq(arr,key){return Array.from(new Set(arr.map(x=>x[key]).filter(Boolean)));}
function advApplyFilters(eventos){
  const get=id=>document.getElementById(id)?.value||'TODOS';
  const persona=get('advPersona'), mes=get('advMes'), anio=get('advAnio'), servicio=get('advServicio'), turno=get('advTurno'), q=(document.getElementById('advQ')?.value||'').trim().toUpperCase();
  return eventos.filter(e=>{
    if(persona!=='TODOS' && e.rfc!==persona) return false;
    if(mes!=='TODOS' && String(e.mesIndex)!==mes) return false;
    if(anio!=='TODOS' && e.anio!==anio) return false;
    if(servicio!=='TODOS' && e.servicio!==servicio) return false;
    if(turno!=='TODOS' && e.turno!==turno) return false;
    if(q && !(e.rfc.toUpperCase().includes(q)||e.nombre.toUpperCase().includes(q)||e.servicio.toUpperCase().includes(q))) return false;
    return true;
  });
}
function advCountMap(rows,keyFn){
  const m=new Map();
  rows.forEach(r=>{const k=keyFn(r)||'—';m.set(k,(m.get(k)||0)+1);});
  return Array.from(m.entries()).sort((a,b)=>b[1]-a[1]||String(a[0]).localeCompare(String(b[0]),'es'));
}
function advPct(n,total){return total?((n/total)*100):0;}
function advBarList(title, rows, total, limit=12){
  const shown=rows.slice(0,limit);
  if(!shown.length) return `<div class="adv-card"><div class="adv-card-h"><h3>${title}</h3><span>0</span></div><div class="empty-adv">Sin datos</div></div>`;
  return `<div class="adv-card"><div class="adv-card-h"><h3>${title}</h3><span>${shown.length} conceptos</span></div><div class="bar-list">`+
    shown.map(([name,count])=>{
      const pct=advPct(count,total);
      return `<div class="bar-row" title="${esc(name)}: ${count} (${pct.toFixed(1)}%)">
        <div class="bar-name">${esc(name)}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${Math.max(pct,2)}%"></div></div>
        <div class="bar-val">${count} · ${pct.toFixed(1)}%</div>
      </div>`;
    }).join('')+`</div></div>`;
}
function advFillSelect(id, values, labelAll='Todos'){
  const el=document.getElementById(id); if(!el) return;
  const current=el.value||'TODOS';
  el.innerHTML=`<option value="TODOS">${labelAll}</option>`+values.map(v=>`<option value="${esc(v.value)}">${esc(v.label)}</option>`).join('');
  if(Array.from(el.options).some(o=>o.value===current)) el.value=current;
}

function pdfHBarChart(doc,{x,y,w,title,data,total,accent=[31,95,139],limit=6,labelWidth=48,rowH=10}){
  const items=(data||[]).slice(0,limit);
  const chartH=Math.max(24, items.length*rowH+10);
  doc.setFillColor(255,255,255); doc.roundedRect(x,y,w,chartH,3,3,'F');
  doc.setDrawColor(228,232,238); doc.roundedRect(x,y,w,chartH,3,3,'S');
  doc.setTextColor(40,45,55); doc.setFontSize(10); doc.text(title,x+4,y+6);
  if(!items.length){ doc.setTextColor(150,160,175); doc.setFontSize(8); doc.text('Sin datos',x+4,y+15); return y+chartH; }
  const max=Math.max(...items.map(i=>i[1]),1);
  let cy=y+12;
  items.forEach(([name,val])=>{
    const pct=total?((val/total)*100):0;
    const truncated = String(name).length>26 ? String(name).slice(0,25)+'…' : String(name);
    doc.setTextColor(85,95,110); doc.setFontSize(7); doc.text(truncated,x+4,cy+3);
    const bx=x+labelWidth, bw=w-labelWidth-22;
    doc.setFillColor(238,241,246); doc.roundedRect(bx,cy,bw,4,2,2,'F');
    doc.setFillColor(accent[0],accent[1],accent[2]); doc.roundedRect(bx,cy,Math.max(2,(val/max)*bw),4,2,2,'F');
    doc.setTextColor(70,75,85); doc.setFontSize(7); doc.text(`${val} · ${pct.toFixed(1)}%`,x+w-4,cy+3,{align:'right'});
    cy+=rowH;
  });
  return y+chartH;
}
function pdfVBarChart(doc,{x,y,w,title,data,total,accent=[31,95,139],limit=8}){

async function genPDF(){

// OVERRIDES V2 - REPORTE DE PERSONA SIN SOBREPOSICIONES
// - Tarjeta visible en ficha y detalle de facilidades
// - Días corregidos en Licencias Médicas y LCGS
// - Encabezado en páginas continuadas de tablas largas
// - Anchos y fuentes ajustados para evitar cortes

function pxFieldAny(row, exactNames=[], containsWords=[]){
  const exact=(exactNames||[]).map(pxNorm);
  for(const [k,v] of Object.entries(row||{})){
    if(v===null||v===undefined||String(v).trim()==='') continue;
    if(exact.includes(pxNorm(k))) return String(v).trim();
  }
  const words=(containsWords||[]).map(pxNorm);
  if(words.length){
    for(const [k,v] of Object.entries(row||{})){
      if(v===null||v===undefined||String(v).trim()==='') continue;
      const nk=pxNorm(k);
      if(words.every(w=>nk.includes(w))) return String(v).trim();
    }
  }
  return '';
}
function pxGuessTarjeta(row){
  return pxFieldAny(row,[
    'TARJETA','NO TARJETA','NO. TARJETA','N° TARJETA','NUMERO DE TARJETA','NÚMERO DE TARJETA',
    'TARJETA DE ASISTENCIA','NUM TARJETA','NOMINA','NÓMINA','NO NOMINA','NO. NOMINA'
  ],['TARJETA']) || '—';
}
function pxGuessDias(row){
  const exact=pxFieldAny(row,[
    '# DIAS','# DÍAS','NO DIAS','NO DÍAS','NO. DIAS','NO. DÍAS','N° DIAS','N° DÍAS',
    'NUMERO DE DIAS','NÚMERO DE DÍAS','DIAS','DÍAS','TOTAL DIAS','TOTAL DÍAS','DURACION','DURACIÓN'
  ]);
  if(exact) return exact;
  for(const [k,v] of Object.entries(row||{})){
    if(v===null||v===undefined||String(v).trim()==='') continue;
    const nk=pxNorm(k);
    if(nk.includes('DIAGNOST')) continue;
    if(nk.includes('FECHA')) continue;
    if(nk==='D' || nk==='D_2') continue;
    if(nk.includes('DIA') || nk.includes('DIAS') || nk.includes('DURACION')){
      const s=String(v).trim();
      if(s) return s;
    }
  }
  return '—';
}
function pxFindPersonTarjeta(persona){
  for(const sheets of Object.values(persona.fuentes||{})){
    for(const recs of Object.values(sheets||{})){
      for(const row of (recs||[])){
        const t=pxGuessTarjeta(row);
        if(t && t!=='—') return t;
      }
    }
  }
  return '—';
}

function pxTableSafe(doc,startY,head,body,opt={}){
  if(!body||!body.length)return startY;
  const firstPage=doc.internal.getCurrentPageInfo().pageNumber;
  const pageTitle=opt.pageTitle||'Reporte Integral de Licencias';
  const pageSubtitle=opt.pageSubtitle||'Continuación';
  const generated=opt.generated||'';

  doc.autoTable({
    startY,head:[head],body,theme:'grid',margin,tableWidth:opt.tableWidth||'auto',
    styles:{font:'helvetica',fontSize:opt.fontSize||6.7,cellPadding:opt.cellPadding||2,overflow:'linebreak',valign:'middle',textColor:PDFX.text,lineColor:PDFX.border,lineWidth:.12,minCellHeight:5},
    headStyles:{fillColor:opt.headColor||PDFX.navy,textColor:[255,255,255],fontStyle:'bold',halign:'center',valign:'middle'},
    alternateRowStyles:{fillColor:[249,251,253]},
    columnStyles:opt.columnStyles||{},

      const current=doc.internal.getCurrentPageInfo().pageNumber;
      if(current!==firstPage){pxHeader(doc,pageTitle,pageSubtitle,generated);}

  return doc.lastAutoTable.finalY+10;
